[custom]
; Subconverter 订阅转换模板配置

; 基础设置
external-controller = 0.0.0.0:9090
secret = nikki
external-ui = "/usr/share/openclash/ui"
external-ui-name = zashboard
external-ui-url = https://gh-proxy.com/GitHub.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
tcp-concurrent = true
unified-delay = true

; ========================
; DNS 设置
; ========================
dns.enable = true
dns.listen = 0.0.0.0:7874
dns.ipv6 = true
dns.enhanced-mode = fake-ip
dns.nameserver = 222.172.200.68
dns.fake-ip-range = 172.28.0.1/16
dns.fake-ip-filter-mode = blacklist
dns.fake-ip-filter = rule-set:fakeipfilter_domain

; ========================
; TUN 模块
; ========================
tun.enable = false
tun.stack = mixed
tun.device = mihomo
tun.endpoint-independent-nat = true
tun.dns-hijack = any:53,tcp://any:53
tun.mtu = 1432
tun.auto-route = true
tun.auto-detect-interface = true
tun.auto-redirect = true
tun.strict-route = true

; ========================
; 嗅探 (Sniffer)
; ========================
sniffer.enable = true
sniffer.override-destination = true
sniffer.force-domain = +.netflix.com,+.nflxvideo.net,+.amazonaws.com,+.media.dssott.com,binance.com,okx.com
sniffer.skip-domain = Mijia Cloud,dlg.io.mi.com,+.oray.com,+.sunlogin.net,+.push.apple.com
sniffer.force-dns-mapping = true
sniffer.parse-pure-ip = true

; 节点过滤与保留
enable_rule_generator = true
overwrite_original_rules = true

; 规则集提供者锚点定义 (用于 rule-providers)
rule-anchor.ip = {type: http, interval: 86400, behavior: ipcidr, format: mrs}
rule-anchor.domain = {type: http, interval: 86400, behavior: domain, format: mrs}
rule-anchor.class = {type: http, interval: 86400, behavior: classical, format: text}

; 策略组锚点
default_anchor = {type: select, proxies: [DIRECT, 所有-智选, 所有-手选, 香港-故转, 台湾-故转, 日本-故转, 新加坡-故转, 美国-故转, 其他-故转, REJECT]}

